# 本地配置（去 nacos，全部走本地配置）。最小集，缺项按启动报错补。
server:
  port: 8081

spring:
  autoconfigure:
    exclude:
      - com.changhong.sei.config.autoconfigure.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryAutoConfiguration
      - com.alibaba.cloud.nacos.endpoint.NacosDiscoveryEndpointAutoConfiguration
      - com.alibaba.cloud.nacos.registry.NacosServiceRegistryAutoConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryClientConfiguration
      - com.alibaba.cloud.nacos.discovery.NacosDiscoveryHeartBeatConfiguration
      - com.alibaba.cloud.nacos.discovery.reactive.NacosReactiveDiscoveryClientConfiguration
      - com.alibaba.cloud.nacos.discovery.configclient.NacosConfigServerAutoConfiguration
      - com.alibaba.cloud.nacos.loadbalancer.LoadBalancerNacosAutoConfiguration
      - com.alibaba.cloud.nacos.NacosServiceAutoConfiguration
      - com.alibaba.cloud.nacos.NacosConfigAutoConfiguration
      - com.alibaba.cloud.nacos.endpoint.NacosConfigEndpointAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5433/sei-online-code
    username: postgres
    password: lslin@32
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
  freemarker:
    check-template-location: false

logging:
  level:
    com.changhong: INFO
    org.hibernate.SQL: WARN
