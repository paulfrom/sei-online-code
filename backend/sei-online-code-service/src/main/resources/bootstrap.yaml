#------------------------------------- 不要删除属性占位符 -------------------------------------#
sei:
  application:
    # 注意：若本地调试时需要修改环境代码，请直接修改DEV，不要删除SEI_SYS_ENV，下面的属性占位符同理。如 env: ${SEI_SYS_ENV:TEST}
    env: ${SEI_SYS_ENV:EADP-DEV}
    code: sei-online-code
    version: '@project_version@'
    description: '@project_description@'
  mock: # 本地调试的当前用户配置
    user:
      tenant-code: global
      account: sei

spring:
  application:
    # 服务名称，优先使用SPRING_APPLICATION_NAME，若没有则使用${sei.application.code}
    name: ${SPRING_APPLICATION_NAME:${sei.application.code}}
  cloud:
    nacos:
      # 本地配置：禁用 nacos 配置中心与服务发现（去 nacos，全部走本地 application.yaml）
      config:
        enabled: false
      discovery:
        enabled: false
