#------------------------------------- 不要删除属性占位符 -------------------------------------#
sei:
  application:
    # 注意：若本地调试时需要修改环境代码，请直接修改DEV，不要删除SEI_SYS_ENV，下面的属性占位符同理。如 env: ${SEI_SYS_ENV:TEST}
    env: ${SEI_SYS_ENV:DEV}
    code: 2668088422724877313
    version: '@project_version@'
    description: '@project_description@'
  mock: # 本地调试的当前用户配置
    user:
      tenant-code: global
      account: sei

spring:
  application:
    # 服务名称，优先使用SPRING_APPLICATION_NAME，若没有则使用${sei.application.code}
    name: ${SPRING_APPLICATION_NAME:${sei.application.code}}
  cloud:
    nacos:
      # nacos地址，优先使用SPRING_CLOUD_NACOS_SERVER_ADDR，若没有则使用127.0.0.1:30048
      server-addr: ${SPRING_CLOUD_NACOS_SERVER_ADDR:127.0.0.1:30048}
      # 认证用户名，优先使用SPRING_CLOUD_NACOS_USERNAME，若没有则使用hello
      username: ${SPRING_CLOUD_NACOS_USERNAME:hello}
      # 认证密码，优先使用SPRING_CLOUD_NACOS_PASSWORD，若没有则使用world
      password: ${SPRING_CLOUD_NACOS_PASSWORD:world}
      discovery:
        # 服务发现命名空间。默认为环境代码，优先使用SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE，若没有则使用${sei.application.env}
        namespace: ${SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE:${sei.application.env}}
      config:
        # 配置管理命名空间。默认为环境代码，优先使用SPRING_CLOUD_NACOS_CONFIG_NAMESPACE，若没有则使用${sei.application.env}
        namespace: ${SPRING_CLOUD_NACOS_CONFIG_NAMESPACE:${sei.application.env}}
        # 配置文件后缀。按sei平台约定默认为yaml格式
        file-extension: yaml
        # 共享配置
        shared-configs:
          - dataId: shared-configs.yaml
            # 动态加载
            refresh: true
