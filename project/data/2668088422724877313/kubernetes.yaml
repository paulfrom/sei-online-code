  JAVA_TOOL_OPTIONS: '-javaagent:/skywalking/agent/skywalking-agent.jar'
  SW_AGENT_COLLECTOR_BACKEND_SERVICES: skywalking-oap:11800
  SW_AGENT_NAMESPACE: eadp-demo
  SW_LOGGING_DIR: /tmp
  SW_LOGGING_MAX_FILE_SIZE: '31457280'
  SW_LOGGING_MAX_HISTORY_FILES: '3'
kind: ConfigMap
metadata:
  name: skywalking-env
  namespace: eadp-demo
---
apiVersion: v1
data:
  # base64加密（echo -n 'MyHandsomeAgentToken' | base64）
  SW_AGENT_AUTHENTICATION: TXlIYW5kc29tZUFnZW50VG9rZW4=
kind: Secret
metadata:
  name: skywalking-auth
  namespace: eadp-demo
# ------------------------------------------ OpenTelemetry Collector（OTel链路监控，与APM链路监控二选一） ------------------------------------------#
---
apiVersion: v1
