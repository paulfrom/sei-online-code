      # Pod 级安全上下文
      securityContext:
        # 文件系统组：用于控制挂载卷权限。挂载卷会自动赋予该组权限，保证容器用户可读写
        fsGroup: 101
      # 节点亲和性和pod反亲和性设置
      affinity:
        # 节点亲和性：要求 Pod 调度到带有指定标签的节点上
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-project
                operator: In
                values:
                - EADP-DEMO
        # pod反亲和性（硬约束），要求具有相同 app 标签的 Pod 不得调度到同一主机上，用于提升高可用性
