# ------------------------------------------ 平台标准环境变量配置 ------------------------------------------#
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: eadp-backend-env
  namespace: eadp-demo
data:
  # 系统环境标识(与效能平台->后台配置->环境管理->代码保持一致)
  SEI_SYS_ENV: "DEV"
  # 应用环境标识，对应 sei.application.env (与效能平台->后台配置->环境管理->代码保持一致)
  SEI_APPLICATION_ENV: "DEV"
  # Nacos 服务地址，对应 spring.cloud.nacos.server-addr
  SPRING_CLOUD_NACOS_SERVER_ADDR: "nacos:8848"
  # Nacos 配置命名空间ID，对应 spring.cloud.nacos.namespace
  SPRING_CLOUD_NACOS_CONFIG_NAMESPACE: "DEV"
  # Nacos 服务发现命名空间ID，对应 spring.cloud.nacos.discovery.namespace
  SPRING_CLOUD_NACOS_DISCOVERY_NAMESPACE: "DEV"
  # 是否注册到注册中心，默认为true，对应 spring.cloud.nacos.discovery.register.enabled
  SPRING_CLOUD_NACOS_DISCOVERY_REGISTER_ENABLED: "true"
  # 服务注册IP(若使用NodePort模式暴露服务，可填任意Node节点IP)
  # SPRING_CLOUD_NACOS_DISCOVERY_IP: "2668088422724877313.eadp-demo.svc"
---
apiVersion: v1
data:
  # base64加密（echo -n 'nacos' | base64）
  SPRING_CLOUD_NACOS_USERNAME: bmFjb3M=
  # base64加密（echo -n 'MyHandsomePassword' | base64）
  SPRING_CLOUD_NACOS_PASSWORD: TXlIYW5kc29tZVBhc3N3b3Jk
kind: Secret
metadata:
  name: eadp-backend-auth
  namespace: eadp-demo

# ------------------------------------------ SkyWalking 环境变量配置(APM链路监控，与OTel链路监控二选一) ------------------------------------------#
---
apiVersion: v1
